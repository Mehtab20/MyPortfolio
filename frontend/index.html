    <!-- Prevent FOUC: apply saved theme instantly before React loads -->
    <script>
      (function() {
        var saved = localStorage.getItem('theme');
        if (saved) {
          document.documentElement.setAttribute('data-theme', saved);
        }
        // Hide spinner once React mounts
        var observer = new MutationObserver(function() {
          var root = document.getElementById('root');
          if (root && root.children.length > 1) {
            var spinner = root.querySelector('style');
            if (spinner) spinner.remove();
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root') || document.documentElement, { childList: true, subtree: true });
      })();
    </script>
  </head>
  <body class="antialiased">
    <div id="root">
      <style>
        #root:empty {
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: #030712;
        }
        #root:empty::after {
          content: '';
          width: 40px;
          height: 40px;
          border: 3px solid rgba(20,184,166,0.2);
          border-top-color: #14b8a6;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
