  <text x="297" y="142" fill="#f3f4f6" font-size="16" font-family="system-ui" font-weight="bold" text-anchor="middle">128</text>
  <rect x="370" y="96" width="130" height="60" rx="6" fill="#0d1b2a" stroke="#14b8a6" stroke-opacity="0.08" stroke-width="0.5"/>
