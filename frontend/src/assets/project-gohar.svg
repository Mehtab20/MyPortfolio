<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="mbg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712"/>
      <stop offset="40%" style="stop-color:#0f0822"/>
      <stop offset="100%" style="stop-color:#030712"/>
    </linearGradient>
    <linearGradient id="sidebarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#030712"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#mbg2)"/>
  <!-- Web browser window -->
  <rect x="100" y="50" width="600" height="400" rx="8" fill="#0a0f1a" stroke="#8b5cf6" stroke-opacity="0.12" stroke-width="1"/>
