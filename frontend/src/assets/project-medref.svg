<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="mbg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#030712"/>
      <stop offset="40%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#030712"/>
    </linearGradient>
    <linearGradient id="phoneGlow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="btnGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#mbg1)"/>
  <!-- Phone frame -->
  <rect x="260" y="50" width="280" height="400" rx="24" fill="#0a1628" stroke="#14b8a6" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Phone notch -->
  <rect x="350" y="58" width="100" height="6" rx="3" fill="#030712"/>
  <!-- Status bar -->
  <text x="285" y="84" fill="#6b7280" font-size="10" font-family="system-ui">9:41</text>
  <text x="490" y="84" fill="#6b7280" font-size="10" font-family="system-ui" text-anchor="end">📶 🔋</text>
  <!-- App header -->
  <rect x="280" y="98" width="240" height="40" rx="8" fill="#14b8a6" opacity="0.15"/>
  <text x="400" y="123" fill="#14b8a6" font-size="13" font-family="system-ui" font-weight="bold" text-anchor="middle">MedRef AI</text>
  <!-- Symptom input area -->
  <rect x="280" y="148" width="240" height="50" rx="8" fill="#111827" stroke="#14b8a6" stroke-opacity="0.15" stroke-width="0.5"/>
  <text x="295" y="168" fill="#6b7280" font-size="9" font-family="system-ui">Describe your symptoms...</text>
  <text x="295" y="184" fill="#4b5563" font-size="8" font-family="system-ui">"persistent headache, fatigue..."</text>
  <!-- Analysis results -->
  <rect x="280" y="210" width="115" height="70" rx="8" fill="#0d1b2a" stroke="#14b8a6" stroke-opacity="0.1" stroke-width="0.5"/>
  <text x="337" y="232" fill="#14b8a6" font-size="9" font-family="system-ui" text-anchor="middle">Diagnosis</text>
  <text x="337" y="252" fill="#f3f4f6" font-size="11" font-family="system-ui" font-weight="bold" text-anchor="middle">Migraine</text>
  <text x="337" y="266" fill="#6b7280" font-size="8" font-family="system-ui" text-anchor="middle">92% confidence</text>
  <rect x="405" y="210" width="115" height="70" rx="8" fill="#0d1b2a" stroke="#06b6d4" stroke-opacity="0.1" stroke-width="0.5"/>
  <text x="462" y="232" fill="#06b6d4" font-size="9" font-family="system-ui" text-anchor="middle">Specialist</text>
  <text x="462" y="252" fill="#f3f4f6" font-size="11" font-family="system-ui" font-weight="bold" text-anchor="middle">Neurologist</text>
  <text x="462" y="266" fill="#6b7280" font-size="8" font-family="system-ui" text-anchor="middle">Dr. Sarah Chen</text>
  <!-- Bottom action button -->
  <rect x="280" y="295" width="240" height="36" rx="10" fill="url(#btnGrad1)"/>
  <text x="400" y="318" fill="#030712" font-size="11" font-family="system-ui" font-weight="bold" text-anchor="middle">Schedule Appointment</text>
  <!-- Bottom dots -->
  <rect x="370" y="340" width="18" height="3" rx="1.5" fill="#14b8a6"/>
  <rect x="392" y="340" width="18" height="3" rx="1.5" fill="#374151"/>
  <rect x="414" y="340" width="18" height="3" rx="1.5" fill="#374151"/>
</svg>
